{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-center align-items-center animate-fade-in" style="min-height: 70vh;">

    <!-- Rendered via Glassmorphic Tokens -->
    <div class="glass-card p-5 shadow-lg" style="width: 100%; max-width: 400px;">

        <div class="text-center mb-4">
            <h2 class="mb-1 text-gradient">Create Account</h2>
            <p class="text-secondary small">Start tracking your portfolio today.</p>
        </div>

        {% if error %}
            <div class="alert alert-danger" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #f87171;">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            <div class="mb-4 position-relative">
                <input type="text" name="username" class="form-control" placeholder="Choose Username" required autocomplete="off">
            </div>

            <div class="mb-4 position-relative">
                <input type="password" name="password" class="form-control" placeholder="Create Password" required>
            </div>

            <button type="submit" class="btn-premium w-100 py-3 mt-2" style="font-size: 1.1rem;">
                Join Platform →
            </button>

        </form>

        <div class="text-center mt-4">
            <p class="text-secondary mb-0">
                Already have an account?
                <a href="/login" class="text-decoration-none fw-bold" style="color: var(--accent-purple);">Login Here</a>
            </p>
        </div>

    </div>

</div>

{% endblock %}
