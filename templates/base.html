<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Investment Advisor</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-primary: #070913;
            --bg-secondary: #0A1128;
            --accent-cyan: #00f2fe;
            --accent-purple: #4facfe;
            --glass-bg: rgba(20, 25, 45, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(30, 40, 65, 0.6);
            --success-glow: rgba(34, 197, 94, 0.4);
            --danger-glow: rgba(239, 68, 68, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        /* Base Body */
        body {
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.1), transparent 25%);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        /* Glassmorphic Navbar */
        .glass-navbar {
            background: rgba(10, 15, 30, 0.7) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 5%;
        }

        .navbar-brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        /* Premium Buttons */
        .btn-premium {
            background: linear-gradient(to right, var(--accent-purple), var(--accent-cyan));
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 10px 24px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
            color: #fff;
        }

        .btn-outline-glass {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 10px 24px;
            font-weight: 500;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .btn-outline-glass:hover {
            background: var(--glass-bg);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* Glassmorphic Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .glass-card-hover:hover {
            transform: translateY(-5px);
            background: var(--glass-hover);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.4);
        }

        /* Smooth Inputs */
        .form-control, .form-select {
            background: rgba(15, 20, 35, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 12px 18px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            background: rgba(20, 25, 45, 0.8);
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 0.25rem rgba(79, 172, 254, 0.25);
            color: #fff;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.4);
        }

        /* Dynamic Text Gradients */
        .text-gradient {
            background: linear-gradient(to right, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Alerts & Flash Messages */
        .custom-alert {
            background: rgba(34, 197, 94, 0.1);
            border-left: 4px solid #22c55e;
            color: #4ade80;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-weight: 500;
            backdrop-filter: blur(8px);
            animation: slideDown 0.4s ease-out forwards;
        }

        .content-container {
            flex-grow: 1;
            padding-bottom: 60px;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .dropdown-item:hover, .dropdown-item:focus {
            background-color: var(--glass-hover);
            color: #fff !important;
        }

    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg glass-navbar sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Smart Advisor AI</a>
        
        <div class="d-flex gap-3 align-items-center">
            {% if session.get("user") %}
                <a class="btn-outline-glass text-decoration-none" href="/dashboard">Dashboard</a>
                <a class="btn-outline-glass text-decoration-none" href="/scanner">Scanner</a>
                <a class="btn-outline-glass text-decoration-none text-danger border-danger" style="background:rgba(239,68,68,0.1);" href="/logout">Logout</a>
            {% else %}
                <a class="btn-outline-glass text-decoration-none" href="/login">Login</a>
                <a class="btn-premium text-decoration-none" href="/signup">Sign Up</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-5 content-container">

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="custom-alert shadow">
                <i class="me-2">✨</i> {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
